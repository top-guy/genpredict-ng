services:
  - type: web
    name: genpredict-ng
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: genpredict-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: genpredict-db
    databaseName: genpredict
    plan: free
