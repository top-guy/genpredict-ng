{% extends 'base.html' %}
{% block title %}Login — GenPredict NG{% endblock %}

{% block body %}
<div class="auth-shell">
  <div class="auth-card card-glass">

    <div class="auth-logo">
      <div class="logo-mark">⚡</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your GenPredict NG account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email Address <span class="required">*</span></label>
        <input
          type="email" id="email" name="email" class="form-control"
          placeholder="you@example.com"
          required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <input
          type="password" id="password" name="password" class="form-control"
          placeholder="Enter your password"
          required autocomplete="current-password">
      </div>

      <div class="flex-between mb-20" style="font-size:0.82rem;">
        <label class="flex-gap gap-sm" style="cursor:pointer;">
          <input type="checkbox" name="remember" id="remember" style="accent-color:var(--amber);">
          <span style="color:var(--text-muted);">Remember me</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-submit">
        Sign In →
      </button>

    </form>

    <div class="divider"></div>

    <div class="text-center" style="font-size:0.85rem;color:var(--text-muted);">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" style="font-weight:600;">Create one free</a>
    </div>

  </div>
</div>
{% endblock %}
